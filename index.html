<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Feed</title>

<style>
body{
    margin:0;
    background:#0f0f0f;
    font-family:Arial;
    color:white;
}
.grid{
    display:grid;
    grid-template-columns:1fr;
    gap:10px;
    padding:10px;
    padding-bottom:70px;
}
.video-card{
    display:flex;
    gap:10px;
    background:#1a1a1a;
    padding:8px;
    border-radius:12px;
    cursor:pointer;
}
.thumb{
    position:relative;
    width:140px;
    flex-shrink:0;
}
.thumb video{
    width:100%;
    height:90px;
    object-fit:cover;
    border-radius:10px;
}
.play-overlay{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:26px;
    background:rgba(0,0,0,0.6);
    border-radius:50%;
    padding:6px 10px;
}
.title{
    font-size:13px;
    color:#ddd;
    line-height:1.3;
}
.navbar{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    background:#111;
    display:flex;
    justify-content:space-around;
    padding:10px 0;
    border-top:1px solid #222;
}
.navbar div{
    font-size:12px;
    opacity:0.7;
}
.navbar .active{
    opacity:1;
    font-weight:bold;
}
#player{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:black;
    display:none;
    justify-content:center;
    align-items:center;
    z-index:999;
    flex-direction:column;
}
#player video{
    width:95%;
    max-width:500px;
}
#closeBtn{
    position:absolute;
    top:15px;
    right:20px;
    font-size:30px;
    cursor:pointer;
}
</style>
</head>

<body>

<div id="app" class="grid"></div>

<div class="navbar">
    <div class="active">Home</div>
    <div>Trending</div>
    <div>Profile</div>
</div>

<div id="player">
    <span id="closeBtn">✕</span>
    <video id="mainVideo" controls playsinline></video>
</div>

<script>
const ad = "https://otieu.com/4/10005133";

const videoList = [
  ["https://cdn.videy.co/HzFH5RDz1.mp4","📍M4L4M H3N1NG M3MBV4T SV45N4 J4D1 B3RB3D4"],
  ["https://cdn.videy.co/cmhLrWXr1.mp4","📍K3P1NCVT T1B4 T1B4 D1 W4KT0 T4K T3DV94"],
  ["https://cdn.videy.co/XDU2q4ld1.mp4","📍D14M D14M K0ND151 B3RVJ0NG T4K B1454"],
  ["https://cdn.videy.co/vhXxLjgh1.mp4","📍S4L4H M0M3N Y4NG B3RVJ0NG K3T3G4NG4N"],
  ["https://cdn.videy.co/R83Xvfrq1.mp4","📍SV45N4 M4L4M B3RVB4H T4NP4 T4ND4"],

  ["https://cdn.videy.co/t10RrKte1.mp4","📍K3D4T4NG4N T4K T3DV94 M3MBV4T P4N1K"],
  ["https://cdn.videy.co/Dw7cVK7j1.mp4","📍M0M3N 51NGK4T N4MVN B3RB3K45 L4M4"],
  ["https://cdn.videy.co/zFZtw2fl1.mp4","📍D4R1 H4L S3D3RH4N J4D1 K3J4D14N B3S4R"],
  ["https://cdn.videy.co/V50e8Zqb1.mp4","📍K0ND151 T4K B1454 M3MBV4T 51TV451 B3RVJ0NG"],
  ["https://cdn.videy.co/8NbhNs5G1.mp4","📍M454 L4L0 T1B4 T1B4 M4NVNCVL K3MB4L1"],

  ["https://cdn.videy.co/QFPCuUMO1.mp4","📍D1 B4L1K 54SV P1NT0 T3R51MP4N C3R1T4"],
  ["https://cdn.videy.co/7TUvXYCA1.mp4","📍M4L4M P4NJ4NG D3NG4N T3K4N4N T4K B1454"],
  ["https://cdn.videy.co/HOm8Bfrn1.mp4","📍T1D4K D1R3NC4N4 N4MVN T3RJ4D1 JVG4"],
  ["https://cdn.videy.co/GOIKvUF51.mp4","📍K3PVT054N C3P4T Y4NG B3RVJ0NG P3NV3S4L4N"],
  ["https://cdn.videy.co/gG8cr0701.mp4","📍K3J4D14N 1TV M3NGVB4H C4R4 P4ND4NG"]
];

const app = document.getElementById("app");
const player = document.getElementById("player");
const mainVideo = document.getElementById("mainVideo");
const closeBtn = document.getElementById("closeBtn");

videoList.forEach(v => {

    const card = document.createElement("div");
    card.className = "video-card";

    const thumb = document.createElement("div");
    thumb.className = "thumb";

    const vid = document.createElement("video");
    vid.src = v[0];
    vid.muted = true;
    vid.preload = "metadata";
    vid.playsInline = true;

    const play = document.createElement("div");
    play.className = "play-overlay";
    play.innerHTML = "▶";

    thumb.appendChild(vid);
    thumb.appendChild(play);

    const title = document.createElement("div");
    title.className = "title";
    title.innerHTML = v[1];

    card.appendChild(thumb);
    card.appendChild(title);
    app.appendChild(card);

    card.onclick = () => {
        player.style.display = "flex";
        mainVideo.src = v[0];
        mainVideo.currentTime = 0;
        mainVideo.play();

        // IKLAN AWAL (KLIK)
        window.open(ad,"_blank");

        let ad20 = false;
        let ad40 = false;

        mainVideo.ontimeupdate = () => {
            const t = Math.floor(mainVideo.currentTime);

            if(t >= 20 && !ad20){
                ad20 = true;
                window.open(ad,"_blank");
            }

            if(t >= 40 && !ad40){
                ad40 = true;
                window.open(ad,"_blank");
            }
        };
    };
});

closeBtn.onclick = () => {
    mainVideo.pause();
    mainVideo.src = "";
    player.style.display = "none";
};
</script>

</body>
</html>
